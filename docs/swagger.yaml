basePath: /api/v1
definitions:
  handlers.AutoConvertRequest:
    properties:
      enabled:
        description: 是否启用自动转换
        example: true
        type: boolean
    type: object
  handlers.ScanRequest:
    properties:
      reimport:
        type: boolean
    type: object
  handlers.pluginHealthResponse:
    properties:
      plugins:
        items:
          $ref: '#/definitions/source.PluginHealthSnapshot'
        type: array
    type: object
  models.BatchDeletePlaylistsRequest:
    properties:
      ids:
        description: 要删除的歌单 ID 列表
        example:
        - 1
        items:
          type: integer
        type: array
    type: object
  models.BatchDeletePlaylistsResponse:
    properties:
      deleted:
        description: 实际删除的数量
        example: 3
        type: integer
    type: object
  models.BatchDeleteSongsRequest:
    properties:
      ids:
        description: 要删除的歌曲 ID 列表
        example:
        - 1
        items:
          type: integer
        type: array
    type: object
  models.BatchDeleteSongsResponse:
    properties:
      deleted:
        description: 实际删除的数量
        example: 3
        type: integer
    type: object
  models.Config:
    properties:
      id:
        description: 配置ID
        example: 1
        type: integer
      key:
        description: 配置键
        example: music_path
        type: string
      updated_at:
        description: 更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
      value:
        description: 配置值（JSON格式）
        example: '{"path":"/music"}'
        type: string
    type: object
  models.CreateConfigRequest:
    properties:
      key:
        description: 配置键
        example: music_path
        type: string
      value:
        description: 配置值（JSON 格式）
        example: '{"path":"/music"}'
        type: string
    required:
    - key
    - value
    type: object
  models.ErrorResponse:
    properties:
      detail:
        description: 详细错误信息（可选）
        example: 详细错误信息
        type: string
      error:
        description: 错误信息
        example: 操作失败
        type: string
    type: object
  models.LoginRequest:
    properties:
      password:
        description: 密码
        example: admin
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  models.LoginResponse:
    properties:
      access_token:
        description: Access Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        description: Access Token 过期时间（秒）
        example: 604800
        type: integer
      refresh_token:
        description: Refresh Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        description: Token 类型
        example: Bearer
        type: string
    type: object
  models.Playlist:
    properties:
      cover_url:
        description: 封面图片 URL
        example: https://example.com/playlist.jpg
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T12:00:00Z"
        type: string
      description:
        description: 歌单描述
        example: 收藏的经典歌曲
        type: string
      id:
        description: 歌单 ID
        example: 1
        type: integer
      labels:
        description: 歌单标签，如 ["built_in"]
        example:
        - '["built_in"]'
        items:
          type: string
        type: array
      name:
        description: 歌单名称
        example: 我的最爱
        type: string
      song_count:
        description: 歌曲数量
        example: 10
        type: integer
      type:
        description: 歌单类型：normal/radio
        enum:
        - normal
        - radio
        example: normal
        type: string
      updated_at:
        description: 最后更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
    type: object
  models.RefreshTokenRequest:
    properties:
      refresh_token:
        description: 刷新令牌
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  models.RevokeTokenRequest:
    properties:
      reason:
        description: 撤销原因
        example: 用户主动登出
        type: string
    type: object
  models.Song:
    properties:
      added_at:
        description: 添加时间
        example: "2024-01-01T12:00:00Z"
        type: string
      album:
        description: 专辑名称
        example: 十一月的萧邦
        type: string
      artist:
        description: 艺术家/歌手
        example: 周杰伦
        type: string
      bit_rate:
        description: 比特率（kbps）
        example: 320
        type: integer
      cover_url:
        description: 封面图片URL
        example: https://example.com/cover.jpg
        type: string
      dedup_key:
        description: 去重 key(由插件定义,典型形态 "<platform>:<platform_id>");与 PluginEntryPath
          组成 UNIQUE
        type: string
      duration:
        description: 播放时长（秒）
        example: 253.5
        type: number
      file_path:
        description: 本地文件路径
        example: /music/周杰伦/夜曲.mp3
        type: string
      file_size:
        description: 文件大小（字节）
        example: 10485760
        type: integer
      format:
        description: 音频格式
        example: mp3
        type: string
      id:
        description: 歌曲ID
        example: 1
        type: integer
      is_live:
        description: 是否为直播流
        example: false
        type: boolean
      lyric_url:
        description: 歌词端点 URL(客户端唯一可见字段,指向 /api/v1/songs/{id}/lyric)
        type: string
      plugin_entry_path:
        description: 音源插件 entryPath(网络歌曲)
        example: my-source
        type: string
      sample_rate:
        description: 采样率（Hz）
        example: 44100
        type: integer
      source_data:
        description: 音源元数据 JSON(给插件 music/url 接口用,opaque)
        type: string
      source_url:
        description: 原始音源 URL(仅 JSON 输出,radio/remote 类型返回原始流地址供编辑使用)
        type: string
      title:
        description: 标题
        example: 夜曲
        type: string
      type:
        description: 歌曲类型：local/remote/radio
        enum:
        - local
        - remote
        - radio
        example: local
        type: string
      updated_at:
        description: 最后更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
      url:
        description: 网络地址
        example: https://example.com/song.mp3
        type: string
    type: object
  models.SuccessResponse:
    properties:
      message:
        description: 成功信息
        example: 操作成功
        type: string
    type: object
  models.TokenInfo:
    properties:
      client_info:
        description: 客户端信息
        example: Mozilla/5.0 AppleWebKit/605.1.15
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T12:00:00Z"
        type: string
      expires_at:
        description: 过期时间
        example: "2024-01-08T12:00:00Z"
        type: string
      revoked_at:
        description: 撤销时间
        example: "2024-01-01T12:00:00Z"
        type: string
      revoked_by:
        description: 撤销者
        example: user
        type: string
      revoked_reason:
        description: 撤销原因
        example: 用户主动登出
        type: string
      token_id:
        description: 令牌 ID
        example: abc123
        type: string
      token_type:
        description: 令牌类型
        enum:
        - access
        - refresh
        example: access
        type: string
    type: object
  models.UpdateConfigRequest:
    properties:
      value:
        description: 配置值（JSON 格式）
        example: '{"path":"/new_music"}'
        type: string
    required:
    - value
    type: object
  models.UpgradeProgress:
    properties:
      current_step:
        description: 当前步骤描述
        example: 正在下载新版本...
        type: string
      error:
        description: 错误信息（如有）
        example: 下载失败
        type: string
      progress:
        description: 进度百分比 (0-100)
        example: 50
        type: integer
      status:
        description: 状态
        enum:
        - idle
        - downloading
        - testing
        - replacing
        - restarting
        - completed
        - failed
        example: downloading
        type: string
    type: object
  services.CacheConfig:
    properties:
      max_size:
        description: 最大缓存大小（字节），0 表示无限制
        type: integer
    type: object
  services.CacheStats:
    properties:
      file_count:
        description: 文件数量
        type: integer
      max_size:
        description: 最大缓存大小（字节），0 表示无限制
        type: integer
      total_size:
        description: 总大小（字节）
        type: integer
    type: object
  services.ConvertProgress:
    properties:
      converted_songs:
        description: 已转换数
        type: integer
      current_song:
        description: 当前正在处理的歌曲
        type: string
      end_time:
        description: 结束时间
        type: string
      error:
        description: 致命错误
        type: string
      errors:
        description: 错误明细
        items:
          type: string
        type: array
      failed_songs:
        description: 失败数
        type: integer
      playlist_id:
        description: 歌单 ID
        type: integer
      processed_songs:
        description: 已处理数(成功+跳过+失败)
        type: integer
      skipped_songs:
        description: 跳过数(本地歌曲、已转过)
        type: integer
      start_time:
        description: 开始时间
        type: string
      status:
        allOf:
        - $ref: '#/definitions/services.ConvertStatus'
        description: 当前状态
      total_songs:
        description: 待转换总数
        type: integer
      waiting:
        description: 是否处于风控限速等待中
        type: boolean
    type: object
  services.ConvertStatus:
    enum:
    - idle
    - running
    - completed
    - failed
    - cancelling
    - cancelled
    type: string
    x-enum-comments:
      ConvertStatusCancelled: 已取消
      ConvertStatusCancelling: 取消中
      ConvertStatusCompleted: 已完成
      ConvertStatusFailed: 失败
      ConvertStatusIdle: 空闲
      ConvertStatusRunning: 转换中
    x-enum-descriptions:
    - 空闲
    - 转换中
    - 已完成
    - 失败
    - 取消中
    - 已取消
    x-enum-varnames:
    - ConvertStatusIdle
    - ConvertStatusRunning
    - ConvertStatusCompleted
    - ConvertStatusFailed
    - ConvertStatusCancelling
    - ConvertStatusCancelled
  services.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  services.ScanProgress:
    properties:
      cleaned_files:
        description: 清理的过期文件数
        type: integer
      current_file:
        description: 当前处理的文件
        type: string
      end_time:
        description: 结束时间
        type: string
      error:
        description: 错误信息
        type: string
      failed_files:
        description: 失败的文件数
        type: integer
      imported_files:
        description: 已导入文件数
        type: integer
      scanned_files:
        description: 已扫描文件数
        type: integer
      skipped_files:
        description: 跳过的文件数（已存在）
        type: integer
      start_time:
        description: 开始时间
        type: string
      status:
        allOf:
        - $ref: '#/definitions/services.ScanStatus'
        description: 当前状态
      total_files:
        description: 总文件数
        type: integer
    type: object
  services.ScanStatus:
    enum:
    - idle
    - scanning
    - importing
    - creating_playlists
    - completed
    - failed
    - cancelling
    - cancelled
    type: string
    x-enum-comments:
      ScanStatusCancelled: 已取消
      ScanStatusCancelling: 取消中
      ScanStatusCompleted: 已完成
      ScanStatusCreatingPlaylists: 自动创建歌单中
      ScanStatusFailed: 失败
      ScanStatusIdle: 空闲
      ScanStatusImporting: 导入中
      ScanStatusScanning: 扫描文件中
    x-enum-descriptions:
    - 空闲
    - 扫描文件中
    - 导入中
    - 自动创建歌单中
    - 已完成
    - 失败
    - 取消中
    - 已取消
    x-enum-varnames:
    - ScanStatusIdle
    - ScanStatusScanning
    - ScanStatusImporting
    - ScanStatusCreatingPlaylists
    - ScanStatusCompleted
    - ScanStatusFailed
    - ScanStatusCancelling
    - ScanStatusCancelled
  source.HealthClass:
    enum:
    - green
    - yellow
    - red
    type: string
    x-enum-comments:
      HealthGreen: 成功率 ≥ green_threshold 且 samples ≥ min_samples
      HealthRed: 成功率 < red_threshold 且 samples ≥ min_samples
      HealthYellow: 介于 green 与 red 之间;或 samples 不足
    x-enum-descriptions:
    - 成功率 ≥ green_threshold 且 samples ≥ min_samples
    - 介于 green 与 red 之间;或 samples 不足
    - 成功率 < red_threshold 且 samples ≥ min_samples
    x-enum-varnames:
    - HealthGreen
    - HealthYellow
    - HealthRed
  source.Outcome:
    properties:
      latency_ns:
        description: 纳秒;swagger 显式声明避免 time.Duration 解析失败
        type: integer
      plugin_entry_path:
        type: string
      reason:
        type: string
      result:
        $ref: '#/definitions/source.OutcomeResult'
      size_bytes:
        type: integer
      timestamp:
        type: string
    type: object
  source.OutcomeResult:
    enum:
    - success
    - network_fail
    - probe_fail
    - validation_fail
    - plugin_invocation_fail
    type: string
    x-enum-comments:
      OutcomeNetworkFail: HTTP 错误、超时、读流中断
      OutcomePluginInvocationFail: 插件 music/url 返回错误或非 200
      OutcomeProbeFail: ffprobe / tag.ReadFrom 失败
      OutcomeValidationFail: 校验未通过(过短、码率过低等)
    x-enum-descriptions:
    - ""
    - HTTP 错误、超时、读流中断
    - ffprobe / tag.ReadFrom 失败
    - 校验未通过(过短、码率过低等)
    - 插件 music/url 返回错误或非 200
    x-enum-varnames:
    - OutcomeSuccess
    - OutcomeNetworkFail
    - OutcomeProbeFail
    - OutcomeValidationFail
    - OutcomePluginInvocationFail
  source.PluginHealthSnapshot:
    properties:
      class:
        $ref: '#/definitions/source.HealthClass'
      last_failures:
        description: 最近 N 次失败,便于排查
        items:
          $ref: '#/definitions/source.Outcome'
        type: array
      plugin_entry_path:
        type: string
      samples:
        type: integer
      success_rate:
        type: number
    type: object
host: localhost:58091
info:
  contact:
    email: im.hanxi@gmail.com
    name: API Support
    url: https://github.com/songloft-org/songloft
  description: 轻量级音乐服务器 API 文档，支持本地音乐管理、网络歌曲、电台和歌单功能
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Songloft API
  version: 2.2.4
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录获取访问令牌
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "400":
          description: 请求数据错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: 用户登录
      tags:
      - 认证管理
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 用户登出，撤销当前访问令牌
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证管理
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            $ref: '#/definitions/services.RefreshResponse'
        "400":
          description: 请求数据错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: 刷新令牌无效
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: 刷新令牌
      tags:
      - 认证管理
  /auth/tokens:
    get:
      consumes:
      - application/json
      description: 获取当前用户的所有活跃令牌列表
      parameters:
      - description: 令牌类型
        enum:
        - access
        - refresh
        in: query
        name: type
        type: string
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - default: 0
        description: 偏移量
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 令牌列表
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 列出活跃令牌
      tags:
      - 认证管理
  /auth/tokens/{token_id}:
    delete:
      consumes:
      - application/json
      description: 撤销指定的令牌
      parameters:
      - description: 令牌ID
        in: path
        name: token_id
        required: true
        type: string
      - description: 撤销令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RevokeTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 撤销成功
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: 请求数据错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 撤销令牌
      tags:
      - 认证管理
    get:
      consumes:
      - application/json
      description: 获取指定令牌的详细信息
      parameters:
      - description: 令牌ID
        in: path
        name: token_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 令牌信息
          schema:
            $ref: '#/definitions/models.TokenInfo'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: 令牌不存在
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取令牌信息
      tags:
      - 认证管理
  /cache-manage/clean:
    post:
      consumes:
      - application/json
      description: 删除服务端所有已缓存的音乐文件,清理后需要重新下载
      produces:
      - application/json
      responses:
        "200":
          description: 清理成功
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 清理失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 清理全部音乐缓存
      tags:
      - 缓存管理
  /cache-manage/config:
    get:
      consumes:
      - application/json
      description: 获取服务端音乐缓存的配置信息,包括最大缓存大小限制
      produces:
      - application/json
      responses:
        "200":
          description: 缓存配置
          schema:
            $ref: '#/definitions/services.CacheConfig'
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取缓存配置
      tags:
      - 缓存管理
    put:
      consumes:
      - application/json
      description: 更新服务端音乐缓存的配置,如最大缓存大小。更新后会自动触发 LRU 淘汰检查。
      parameters:
      - description: 缓存配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.CacheConfig'
      produces:
      - application/json
      responses:
        "200":
          description: 更新后的缓存配置
          schema:
            $ref: '#/definitions/services.CacheConfig'
        "400":
          description: 请求参数无效
