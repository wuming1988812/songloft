        type: boolean
    type: object
  handlers.logLevelSettingRequest:
    properties:
      level:
        type: string
    type: object
  handlers.pluginHealthResponse:
    properties:
      plugins:
        items:
          $ref: '#/definitions/source.PluginHealthSnapshot'
        type: array
    type: object
  handlers.pluginRegistriesSetting:
    properties:
      registries:
        items:
          $ref: '#/definitions/jsplugin.RegistryConfig'
        type: array
    type: object
  handlers.pluginTabEntry:
    properties:
      entry_path:
        type: string
      name:
        type: string
      plugin_id:
        type: integer
    type: object
  handlers.registryInstallRequest:
    properties:
      download_url:
        type: string
      github_proxy:
        type: string
    type: object
  handlers.registryPluginEntry:
    properties:
      author:
        type: string
      description:
        type: string
      download_url:
        type: string
      entry_path:
        type: string
      has_update:
        type: boolean
      homepage:
        type: string
      icon:
        type: string
      installed:
        type: boolean
      installed_version:
        type: string
      name:
        type: string
      version:
        type: string
    type: object
  handlers.registryRefreshRequest:
    properties:
      github_proxy:
        type: string
      page:
        type: integer
      page_size:
        type: integer
      registry_url:
        type: string
      search:
        type: string
    type: object
  handlers.registryRefreshResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      plugins:
        items:
          $ref: '#/definitions/handlers.registryPluginEntry'
        type: array
      total:
        type: integer
      warnings:
        items:
          type: string
        type: array
    type: object
  handlers.scanAutoCreateSubdirsRequest:
    properties:
      enabled:
        type: boolean
    type: object
  handlers.scanTitleSourceRequest:
    properties:
      title_source:
        enum:
        - tag
        - filename
        example: tag
        type: string
    type: object
  handlers.tabConfigSetting:
    properties:
      plugin_tabs:
        items:
          $ref: '#/definitions/handlers.pluginTabEntry'
        type: array
      show_library:
        type: boolean
      show_playlists:
        type: boolean
    type: object
  jsplugin.JSPlugin:
    properties:
      author:
        type: string
      created_at:
        type: string
      description:
        type: string
      download_url:
        type: string
      entry_hash:
        description: main.js/main.jsc 内容 SHA256
        type: string
      entry_path:
        description: 路由前缀（如 "myplugin"）
        type: string
      file_mod_time:
        type: string
      file_path:
        description: ZIP 文件相对路径
        type: string
      homepage:
        type: string
      id:
        type: integer
      license:
        type: string
      main:
        description: 入口文件路径（如 "main.js"）
        type: string
      min_host_version:
        type: string
      name:
        type: string
      permissions:
        description: 权限列表
        items:
          type: string
        type: array
      status:
        $ref: '#/definitions/models.JSPluginStatus'
      update_url:
        type: string
      updated_at:
        type: string
      version:
        type: string
      zip_hash:
        description: ZIP 文件 SHA256
        type: string
    type: object
  jsplugin.RegistryConfig:
    properties:
      enabled:
        type: boolean
      name:
        type: string
      url:
        type: string
    type: object
  models.BatchDeletePlaylistsRequest:
    properties:
      ids:
        description: 要删除的歌单 ID 列表
        example:
        - 1
        items:
          type: integer
        type: array
    type: object
  models.BatchDeletePlaylistsResponse:
    properties:
      deleted:
        description: 实际删除的数量
        example: 3
        type: integer
    type: object
  models.BatchDeleteSongsRequest:
    properties:
      ids:
        description: 要删除的歌曲 ID 列表
        example:
        - 1
        items:
          type: integer
        type: array
    type: object
  models.BatchDeleteSongsResponse:
    properties:
      deleted:
        description: 实际删除的数量
        example: 3
        type: integer
    type: object
  models.Config:
    properties:
      id:
        description: 配置ID
        example: 1
        type: integer
      key:
        description: 配置键
        example: music_path
        type: string
      updated_at:
        description: 更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
      value:
        description: 配置值（JSON格式）
        example: '{"path":"/music"}'
        type: string
    type: object
  models.CreateConfigRequest:
    properties:
      key:
        description: 配置键
        example: music_path
        type: string
      value:
        description: 配置值（JSON 格式）
        example: '{"path":"/music"}'
        type: string
    required:
    - key
    - value
    type: object
  models.ErrorResponse:
    properties:
      detail:
        description: 详细错误信息（可选）
        example: 详细错误信息
        type: string
      error:
        description: 错误信息
        example: 操作失败
        type: string
    type: object
  models.ImportResult:
    properties:
      playlists_created:
        type: integer
      playlists_merged:
        type: integer
      songs_created:
        type: integer
      songs_matched:
        type: integer
      songs_skipped:
        type: integer
    type: object
  models.JSPluginStatus:
    enum:
    - active
    - inactive
    - error
    type: string
    x-enum-comments:
      JSPluginStatusActive: 激活状态
      JSPluginStatusError: 错误状态
      JSPluginStatusInactive: 未激活状态
    x-enum-descriptions:
    - 激活状态
    - 未激活状态
    - 错误状态
    x-enum-varnames:
    - JSPluginStatusActive
    - JSPluginStatusInactive
    - JSPluginStatusError
  models.LoginRequest:
    properties:
      password:
        description: 密码
        example: admin
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  models.LoginResponse:
    properties:
      access_token:
        description: Access Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        description: Access Token 过期时间（秒）
        example: 604800
        type: integer
      refresh_token:
        description: Refresh Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        description: Token 类型
        example: Bearer
        type: string
    type: object
  models.Playlist:
    properties:
      cover_url:
        description: 封面图片 URL
        example: https://example.com/playlist.jpg
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T12:00:00Z"
        type: string
      description:
        description: 歌单描述
        example: 收藏的经典歌曲
        type: string
      id:
        description: 歌单 ID
        example: 1
        type: integer
      labels:
        description: 歌单标签，如 ["built_in"]
        example:
        - '["built_in"]'
        items:
          type: string
        type: array
      name:
        description: 歌单名称
        example: 我的最爱
        type: string
      song_count:
        description: 歌曲数量
        example: 10
        type: integer
      type:
        description: 歌单类型：normal/radio
        enum:
        - normal
        - radio
        example: normal
        type: string
      updated_at:
        description: 最后更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
    type: object
  models.RefreshTokenRequest:
    properties:
      refresh_token:
        description: 刷新令牌
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  models.RevokeTokenRequest:
    properties:
      reason:
        description: 撤销原因
        example: 用户主动登出
        type: string
    type: object
  models.Song:
    properties:
      added_at:
        description: 添加时间
        example: "2024-01-01T12:00:00Z"
        type: string
      album:
        description: 专辑名称
        example: 十一月的萧邦
        type: string
      artist:
        description: 艺术家/歌手
        example: 周杰伦
        type: string
      bit_rate:
        description: 比特率（kbps）
        example: 320
        type: integer
      cover_url:
        description: 封面图片URL
        example: https://example.com/cover.jpg
        type: string
      dedup_key:
        description: 去重 key(由插件定义,典型形态 "<platform>:<platform_id>");与 PluginEntryPath
          组成 UNIQUE
        type: string
      duration:
        description: 播放时长（秒）
        example: 253.5
        type: number
      file_path:
        description: 本地文件路径
        example: /music/周杰伦/夜曲.mp3
        type: string
      file_size:
        description: 文件大小（字节）
        example: 10485760
        type: integer
      format:
        description: 音频格式
        example: mp3
        type: string
      genre:
        description: 流派
        example: Pop
        type: string
      id:
        description: 歌曲ID
        example: 1
        type: integer
      is_live:
        description: 是否为直播流
        example: false
        type: boolean
      lyric_url:
        description: 歌词端点 URL(客户端唯一可见字段,指向 /api/v1/songs/{id}/lyric)
        type: string
      plugin_entry_path:
        description: 音源插件 entryPath(网络歌曲)
        example: my-source
        type: string
      sample_rate:
        description: 采样率（Hz）
        example: 44100
        type: integer
      source_data:
        description: 音源元数据 JSON(给插件 music/url 接口用,opaque)
        type: string
      source_url:
        description: 原始音源 URL(仅 JSON 输出,radio/remote 类型返回原始流地址供编辑使用)
        type: string
      title:
        description: 标题
        example: 夜曲
        type: string
      type:
        description: 歌曲类型：local/remote/radio
        enum:
        - local
        - remote
        - radio
        example: local
        type: string
      updated_at:
        description: 最后更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
      url:
        description: 网络地址
        example: https://example.com/song.mp3
        type: string
      year:
        description: 发行年份
        example: 2005
        type: integer
    type: object
  models.SuccessResponse:
    properties:
      message:
        description: 成功信息
        example: 操作成功
        type: string
    type: object
  models.TokenInfo:
    properties:
      client_info:
        description: 客户端信息
        example: Mozilla/5.0 AppleWebKit/605.1.15
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T12:00:00Z"
        type: string
      expires_at:
        description: 过期时间
        example: "2024-01-08T12:00:00Z"
        type: string
      revoked_at:
        description: 撤销时间
        example: "2024-01-01T12:00:00Z"
        type: string
      revoked_by:
        description: 撤销者
        example: user
        type: string
      revoked_reason:
        description: 撤销原因
        example: 用户主动登出
        type: string
      token_id:
        description: 令牌 ID
        example: abc123
        type: string
      token_type:
        description: 令牌类型
        enum:
        - access
        - refresh
        example: access
        type: string
    type: object
  models.UpdateConfigRequest:
    properties:
      value:
        description: 配置值（JSON 格式）
        example: '{"path":"/new_music"}'
        type: string
    required:
    - value
    type: object
  models.UpgradeProgress:
    properties:
      current_step:
        description: 当前步骤描述
        example: 正在下载新版本...
        type: string
      error:
        description: 错误信息（如有）
        example: 下载失败
        type: string
      progress:
        description: 进度百分比 (0-100)
        example: 50
        type: integer
      status:
        description: 状态
        enum:
        - idle
        - downloading
        - testing
        - replacing
        - restarting
        - completed
        - failed
        example: downloading
        type: string
    type: object
  services.CacheConfig:
    properties:
      max_size:
        description: 最大缓存大小（字节），0 表示无限制
        type: integer
    type: object
  services.CacheStats:
    properties:
      file_count:
        description: 文件数量
        type: integer
      max_size:
        description: 最大缓存大小（字节），0 表示无限制
        type: integer
      total_size:
        description: 总大小（字节）
        type: integer
    type: object
  services.ConvertProgress:
    properties:
      converted_songs:
        description: 已转换数
        type: integer
      current_song:
        description: 当前正在处理的歌曲
        type: string
      end_time:
        description: 结束时间
        type: string
      error:
        description: 致命错误
        type: string
      errors:
        description: 错误明细
        items:
          type: string
        type: array
      failed_songs:
        description: 失败数
        type: integer
      playlist_id:
        description: 歌单 ID
        type: integer
      processed_songs:
        description: 已处理数(成功+跳过+失败)
        type: integer
      skipped_songs:
        description: 跳过数(本地歌曲、已转过)
        type: integer
      start_time:
        description: 开始时间
        type: string
      status:
        allOf:
        - $ref: '#/definitions/services.ConvertStatus'
        description: 当前状态
      total_songs:
        description: 待转换总数
        type: integer
      waiting:
        description: 是否处于风控限速等待中
        type: boolean
    type: object
  services.ConvertStatus:
    enum:
    - idle
    - running
    - completed
    - failed
    - cancelling
    - cancelled
    type: string
    x-enum-comments:
      ConvertStatusCancelled: 已取消
      ConvertStatusCancelling: 取消中
      ConvertStatusCompleted: 已完成
      ConvertStatusFailed: 失败
      ConvertStatusIdle: 空闲
      ConvertStatusRunning: 转换中
    x-enum-descriptions:
    - 空闲
    - 转换中
    - 已完成
    - 失败
    - 取消中
    - 已取消
    x-enum-varnames:
    - ConvertStatusIdle
    - ConvertStatusRunning
    - ConvertStatusCompleted
    - ConvertStatusFailed
    - ConvertStatusCancelling
    - ConvertStatusCancelled
  services.OrganizeItem:
    properties:
      id:
        type: integer
      target_path:
        type: string
    type: object
  services.OrganizeResult:
    properties:
      error:
        type: string
      file_path:
        type: string
      id:
        type: integer
      status:
        type: string
    type: object
  services.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  services.ScanProgress:
    properties:
      cleaned_files:
        description: 清理的过期文件数
        type: integer
      current_file:
        description: 当前处理的文件
        type: string
      end_time:
        description: 结束时间
        type: string
      error:
        description: 错误信息
        type: string
      failed_files:
        description: 失败的文件数
        type: integer
      imported_files:
        description: 已导入文件数
        type: integer
      scanned_files:
        description: 已扫描文件数
        type: integer
      skipped_files:
        description: 跳过的文件数（已存在）
        type: integer
      start_time:
        description: 开始时间
        type: string
      status:
        allOf:
        - $ref: '#/definitions/services.ScanStatus'
        description: 当前状态
      total_files:
        description: 总文件数
        type: integer
    type: object
  services.ScanStatus:
    enum:
    - idle
    - scanning
    - importing
    - creating_playlists
    - completed
    - failed
    - cancelling
    - cancelled
    type: string
    x-enum-comments:
      ScanStatusCancelled: 已取消
      ScanStatusCancelling: 取消中
      ScanStatusCompleted: 已完成
      ScanStatusCreatingPlaylists: 自动创建歌单中
      ScanStatusFailed: 失败
      ScanStatusIdle: 空闲
      ScanStatusImporting: 导入中
      ScanStatusScanning: 扫描文件中
    x-enum-descriptions:
    - 空闲
    - 扫描文件中
    - 导入中
    - 自动创建歌单中
    - 已完成
    - 失败
    - 取消中
    - 已取消
    x-enum-varnames:
    - ScanStatusIdle
    - ScanStatusScanning
    - ScanStatusImporting
    - ScanStatusCreatingPlaylists
    - ScanStatusCompleted
    - ScanStatusFailed
    - ScanStatusCancelling
    - ScanStatusCancelled
  source.HealthClass:
    enum:
    - green
    - yellow
    - red
    type: string
    x-enum-comments:
      HealthGreen: 成功率 ≥ green_threshold 且 samples ≥ min_samples
      HealthRed: 成功率 < red_threshold 且 samples ≥ min_samples
      HealthYellow: 介于 green 与 red 之间;或 samples 不足
    x-enum-descriptions:
    - 成功率 ≥ green_threshold 且 samples ≥ min_samples
    - 介于 green 与 red 之间;或 samples 不足
    - 成功率 < red_threshold 且 samples ≥ min_samples
    x-enum-varnames:
    - HealthGreen
    - HealthYellow
    - HealthRed
  source.Outcome:
    properties:
      latency_ns:
        description: 纳秒;swagger 显式声明避免 time.Duration 解析失败
        type: integer
      plugin_entry_path:
        type: string
      reason:
        type: string
      result:
        $ref: '#/definitions/source.OutcomeResult'
      size_bytes:
        type: integer
      timestamp:
        type: string
    type: object
  source.OutcomeResult:
    enum:
    - success
    - network_fail
    - probe_fail
    - validation_fail
    - plugin_invocation_fail
    type: string
    x-enum-comments:
      OutcomeNetworkFail: HTTP 错误、超时、读流中断
      OutcomePluginInvocationFail: 插件 music/url 返回错误或非 200
      OutcomeProbeFail: ffprobe / tag.ReadFrom 失败
      OutcomeValidationFail: 校验未通过(过短、码率过低等)
    x-enum-descriptions:
    - ""
    - HTTP 错误、超时、读流中断
    - ffprobe / tag.ReadFrom 失败
    - 校验未通过(过短、码率过低等)
    - 插件 music/url 返回错误或非 200
    x-enum-varnames:
    - OutcomeSuccess
    - OutcomeNetworkFail
    - OutcomeProbeFail
    - OutcomeValidationFail
    - OutcomePluginInvocationFail
  source.PluginHealthSnapshot:
    properties:
      class:
        $ref: '#/definitions/source.HealthClass'
      last_failures:
        description: 最近 N 次失败,便于排查
        items:
          $ref: '#/definitions/source.Outcome'
        type: array
      plugin_entry_path:
        type: string
      samples:
        type: integer
      success_rate:
        type: number
    type: object
host: localhost:58091
info:
  contact:
    email: im.hanxi@gmail.com
    name: API Support
    url: https://github.com/songloft-org/songloft
  description: 轻量级音乐服务器 API 文档，支持本地音乐管理、网络歌曲、电台和歌单功能
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Songloft API
  version: 2.6.1
paths:
  /api/v1/songs/{id}/tags:
    put:
      consumes:
      - application/json
      description: 将元数据写入数据库和本地音频文件标签（仅本地歌曲）。cover_data(base64) 优先于 cover_url。非空字段覆盖，空值保留原值。
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      - description: 标签数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.WriteSongTagsRequest'
      produces:
      - application/json
      responses:
