  handlers.jsPluginBatchUpdateResponse:
    properties:
      failed:
        type: integer
      message:
        type: string
      results:
        items:
          $ref: '#/definitions/handlers.jsPluginBatchUpdateResult'
        type: array
      skipped:
        type: integer
      total:
        type: integer
      updated:
        type: integer
    type: object
  handlers.jsPluginBatchUpdateResult:
    properties:
      current_version:
        type: string
      entry_path:
        type: string
      error:
        type: string
      has_update:
        type: boolean
      new_version:
        type: string
      plugin_id:
        type: integer
      plugin_name:
        type: string
      success:
        type: boolean
    type: object
  handlers.jsPluginUploadResponse:
    properties:
      failed:
        type: integer
      message:
        type: string
      results:
        items:
          $ref: '#/definitions/handlers.jsPluginUploadResult'
        type: array
      success:
        type: integer
