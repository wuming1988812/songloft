  /playlists/export:
    get:
      description: 导出所有歌单（含曲目关联）为 JSON 文件，响应头携带 Content-Disposition 直接触发浏览器下载
      produces:
      - application/json
      responses:
        "200":
          description: 歌单备份 JSON 文件
          schema:
            type: file
        "500":
          description: 导出失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 导出歌单备份
      tags:
      - 数据备份
  /playlists/import:
    post:
      consumes:
      - multipart/form-data
      description: 从 multipart/form-data 上传的 JSON 备份文件还原歌单。已存在的歌单按名称合并，曲目按内容匹配去重。
      parameters:
      - description: 歌单备份 JSON 文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 导入结果（新建/合并歌单数、新建/匹配曲目数）
          schema:
            $ref: '#/definitions/models.ImportResult'
        "400":
          description: 请求格式错误或文件无效
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 导入失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 导入歌单备份
      tags:
      - 数据备份
  /playlists/reorder:
    put:
      consumes:
      - application/json
      description: 重新排序歌单列表
      parameters:
      - description: 歌单 ID 列表
        in: body
        name: request
        required: true
        schema:
          properties:
            playlist_ids:
              items:
                format: int64
                type: integer
              type: array
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 排序成功
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 排序失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 重新排序歌单列表
      tags:
      - 歌单管理
  /plugins/health:
    get:
      description: 返回各音乐源插件的下载成功率、健康度分类(green/yellow/red)与最近 5 条失败原因。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.pluginHealthResponse'
      security:
      - BearerAuth: []
      summary: 音源健康度
      tags:
      - JS插件管理
  /proxy:
    get:
      description: 代理外部资源（图片、音频、视频流等），解决浏览器 CORS 限制。支持流式转发、Range 请求透传、Content-Type
        透传和域名白名单校验
      parameters:
      - description: 目标资源的 URL（URL 编码）
        in: query
        name: url
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 代理的资源内容
          schema:
            type: file
        "206":
          description: 部分内容（Range 请求）
          schema:
            type: file
        "400":
          description: 缺少 url 参数或 URL 无效
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 域名不在白名单中
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: 上游请求失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 代理外部资源
      tags:
      - 资源代理
  /scan:
    post:
      consumes:
      - application/json
      description: 异步扫描音乐目录并导入新发现的音乐文件到数据库，立即返回，可通过进度接口查询状态
      parameters:
      - description: 扫描请求参数
        in: body
        name: request
        schema:
          $ref: '#/definitions/handlers.ScanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 扫描任务已启动
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 扫描正在进行中
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 启动扫描失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 扫描并导入本地音乐
      tags:
      - 扫描管理
  /scan/cancel:
    post:
      consumes:
      - application/json
      description: 取消正在进行的扫描任务
      produces:
      - application/json
      responses:
        "200":
          description: 取消成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 没有正在进行的扫描任务
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 取消扫描
      tags:
      - 扫描管理
  /scan/dir-names:
    get:
      consumes:
      - application/json
      description: 递归收集音乐目录下所有唯一的目录名称，按字母排序返回，用于排除目录名称的自动补全
      produces:
      - application/json
      responses:
        "200":
          description: 目录名称列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 收集目录名称失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取所有目录名称
      tags:
      - 扫描管理
  /scan/directories:
    get:
      consumes:
      - application/json
      description: 返回指定路径下的一级子目录列表，用于目录树懒加载。path 为空时返回音乐根目录下的子目录
      parameters:
      - description: 目录路径（为空时使用音乐根目录）
        in: query
        name: path
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 子目录列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 无效的路径
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 读取目录失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取子目录列表
      tags:
      - 扫描管理
  /scan/progress:
    get:
      consumes:
      - application/json
      description: 获取当前扫描任务的进度信息
      produces:
      - application/json
      responses:
        "200":
          description: 扫描进度信息
          schema:
            $ref: '#/definitions/services.ScanProgress'
      security:
      - BearerAuth: []
      summary: 获取扫描进度
      tags:
      - 扫描管理
  /settings/auto-convert:
    get:
      consumes:
      - application/json
      description: 获取“网络歌曲缓存完成后自动转为本地”开关的当前状态
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段表示开关状态
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: 获取自动转换开关
      tags:
      - 歌单转换
    put:
      consumes:
      - application/json
      description: 开启或关闭“网络歌曲缓存完成后自动转为本地”功能。开启后,任何 remote 类型歌曲缓存下载完成时,会异步在其所在的所有普通歌单中触发转换。
      parameters:
      - description: 开关请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AutoConvertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段表示更新后的开关状态
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: 请求格式错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新自动转换开关
      tags:
      - 歌单转换
  /settings/hls-proxy:
    get:
      description: 获取“HLS 电台流通过本机反代回客户端”开关的当前状态
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段表示开关状态
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: 获取 HLS 代理开关
      tags:
      - 电台与 HLS
    put:
      consumes:
      - application/json
      description: 开启/关闭 HLS 反代。开启时电台切片字节全部经本机转发（解决源站 Referer/CORS 拦截），关闭时仅 302 给
        player。
      parameters:
      - description: 开关请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.hlsProxySettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段表示更新后的开关状态
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: 请求格式错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新 HLS 代理开关
      tags:
      - 电台与 HLS
  /settings/http-proxy:
    get:
      description: 获取全局 HTTP 代理地址。所有后端外发请求（插件下载、注册表拉取、升级检查等）会通过此代理转发。未配置时返回空字符串（直连）。
      produces:
      - application/json
      responses:
        "200":
          description: 代理配置
          schema:
            $ref: '#/definitions/handlers.httpProxySetting'
      security:
      - BearerAuth: []
      summary: 获取 HTTP 代理配置
      tags:
      - 设置
    put:
      consumes:
      - application/json
      description: 设置全局 HTTP 代理地址（如 http://192.168.1.1:7890）。设为空字符串则关闭代理。保存后即时生效，无需重启。
      parameters:
      - description: 代理配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.httpProxySetting'
      produces:
      - application/json
      responses:
        "200":
          description: 保存后的代理配置
          schema:
            $ref: '#/definitions/handlers.httpProxySetting'
        "400":
          description: 请求格式错误或代理地址无效
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存 HTTP 代理配置
      tags:
      - 设置
  /settings/log-level:
    get:
      description: 返回当前 slog 全局日志等级
      produces:
      - application/json
      responses:
        "200":
          description: 返回 level 字段：debug/info/warn/error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取日志等级
      tags:
      - 设置
    put:
      consumes:
      - application/json
      description: 切换 slog 全局日志等级并持久化。新等级即时生效，重启后从 DB 恢复。
      parameters:
      - description: 等级请求（debug/info/warn/error）
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.logLevelSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 返回更新后的 level
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 请求格式错误或等级非法
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新日志等级
      tags:
      - 设置
  /settings/music-path:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MusicPathSetting'
      security:
      - BearerAuth: []
      summary: 获取音乐路径与扫描排除配置
      tags:
      - 扫描管理
    put:
      consumes:
      - application/json
      description: 写入 music_path 配置并触发 Scanner 重建 + 清理排除目录中的歌曲（与 admin /configs PUT
        的副作用一致）。
      parameters:
      - description: 配置内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.MusicPathSetting'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MusicPathSetting'
        "400":
          description: 请求格式错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新音乐路径与扫描排除配置
      tags:
      - 扫描管理
  /settings/plugin-registries:
    get:
      description: 获取用户保存的所有插件注册表订阅源 URL。未配置时返回空列表。
      produces:
      - application/json
      responses:
        "200":
          description: 订阅源列表
          schema:
            $ref: '#/definitions/handlers.pluginRegistriesSetting'
      security:
      - BearerAuth: []
      summary: 获取插件订阅源列表
      tags:
      - JS插件管理
    put:
      consumes:
      - application/json
      description: 保存用户配置的插件注册表订阅源 URL 列表。每个源包含 URL、名称和是否启用。
      parameters:
      - description: 订阅源列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.pluginRegistriesSetting'
      produces:
      - application/json
      responses:
        "200":
          description: 保存后的订阅源列表
          schema:
            $ref: '#/definitions/handlers.pluginRegistriesSetting'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存插件订阅源列表
      tags:
      - JS插件管理
  /settings/scan-auto-create-include-subdirs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: 获取「扫描后自动创建歌单是否包含子目录」开关
      tags:
      - 扫描管理
    put:
      consumes:
      - application/json
      parameters:
      - description: 开关请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.scanAutoCreateSubdirsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: 请求格式错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新「扫描后自动创建歌单是否包含子目录」开关
      tags:
      - 扫描管理
  /settings/scan-title-source:
    get:
      description: tag：优先使用音频标签中的标题（默认）；filename：始终使用文件名（不含扩展名）作为标题。切换后需以「重新导入」模式扫描才能生效。
      produces:
      - application/json
      responses:
        "200":
          description: 返回 title_source 字段
          schema:
            $ref: '#/definitions/handlers.scanTitleSourceRequest'
      security:
      - BearerAuth: []
      summary: 获取扫描标题来源配置
      tags:
      - 扫描管理
    put:
      consumes:
      - application/json
      description: tag：优先使用音频标签中的标题；filename：始终使用文件名（不含扩展名）作为标题。切换后需以「重新导入」模式扫描才能生效。
      parameters:
      - description: 标题来源配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.scanTitleSourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 返回 title_source 字段
          schema:
            $ref: '#/definitions/handlers.scanTitleSourceRequest'
        "400":
          description: 请求格式错误或参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新扫描标题来源配置
      tags:
      - 扫描管理
  /settings/tab-config:
    get:
      description: 获取用户自定义的底部导航栏 Tab 配置。首页和设置固定显示，歌曲库和歌单可关闭，最多可添加 2 个插件 Tab，总计不超过
        5 个。未配置时返回默认值（4 个 Tab：首页、歌曲库、歌单、设置）。
      produces:
      - application/json
      responses:
        "200":
          description: Tab 配置
          schema:
            $ref: '#/definitions/handlers.tabConfigSetting'
      security:
      - BearerAuth: []
      summary: 获取底部导航栏 Tab 配置
      tags:
      - 设置
    put:
      consumes:
      - application/json
      description: 保存用户自定义的底部导航栏 Tab 配置。首页和设置固定显示（不在配置中），可选项为歌曲库、歌单和插件 Tab，可选项总数不超过
        3 个（总计 5 个 Tab）。每个插件 Tab 的 entry_path 和 name 不能为空，且不能重复。
      parameters:
      - description: Tab 配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.tabConfigSetting'
      produces:
      - application/json
      responses:
        "200":
          description: 保存后的 Tab 配置
          schema:
            $ref: '#/definitions/handlers.tabConfigSetting'
        "400":
          description: 请求格式错误或校验失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存底部导航栏 Tab 配置
      tags:
      - 设置
  /songs:
    get:
      consumes:
      - application/json
      description: 获取歌曲列表，支持按类型过滤、关键词搜索和分页
      parameters:
      - description: 歌曲类型
        enum:
        - local
        - remote
        - radio
        in: query
        name: type
        type: string
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 按 file_path 前缀过滤（如 music/Pop）
        in: query
        name: path_prefix
        type: string
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - default: 0
        description: 偏移量
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回歌曲列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取歌曲列表
      tags:
      - 歌曲管理
  /songs/{id}:
    delete:
      consumes:
      - application/json
      description: 根据歌曲ID删除歌曲
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 无效的歌曲ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 删除失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 删除歌曲
      tags:
      - 歌曲管理
    get:
      consumes:
      - application/json
      description: 根据歌曲ID获取详细信息
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回歌曲详情
          schema:
            $ref: '#/definitions/models.Song'
        "400":
          description: 无效的歌曲ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取单个歌曲详情
      tags:
      - 歌曲管理
    put:
      consumes:
      - application/json
      description: 更新歌曲信息（仅支持网络歌曲和电台）
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      - description: 歌曲信息
        in: body
        name: request
        required: true
        schema:
          properties:
            album:
              type: string
            artist:
              type: string
            cover_url:
              type: string
            title:
              type: string
            url:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/models.Song'
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 更新失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新歌曲信息
      tags:
      - 歌曲管理
  /songs/{id}/activate:
    post:
      description: 客户端切歌前调用，让后端 cancel 同一会话下其他歌曲的进行中工作（prefetch/transcode/reassign）。其他客户端会话不受影响。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 无内容
        "400":
          description: 无效的 song_id
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 标记当前活跃歌曲
      tags:
      - 歌曲管理
  /songs/{id}/cover:
    get:
      description: 根据歌曲 ID 获取封面图片，支持本地歌曲的封面文件
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: 封面图片
          schema:
            type: file
        "400":
          description: 无效的歌曲 ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲或封面不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取歌曲封面图片
      tags:
      - 歌曲管理
  /songs/{id}/hls/playlist:
    get:
      description: HLS 反代开启时，由 ServeProxy 改写后的 m3u8 内回链触发。拉取上游 m3u8 → 同源校验 → 改写 URI
        → 回写给 player。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 上游 m3u8 URL（base64url 编码）
        in: query
        name: u
        required: true
        type: string
      produces:
      - application/vnd.apple.mpegurl
      responses:
        "200":
          description: 改写后的 m3u8 文本
          schema:
            type: string
        "400":
          description: song_id 或 u 参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 非同源 URL 拒绝代理（SSRF 防护）
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 上游不可用
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 反代 HLS 子层 m3u8
      tags:
      - 电台与 HLS
  /songs/{id}/hls/segment:
    get:
      description: 由 HandlePlaylist 改写后的相对路径触发，反代音频切片、加密 key、init 段等二进制资源。透传 Range
        请求。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 上游切片 URL（base64url 编码）
        in: query
        name: u
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 切片二进制内容
          schema:
            type: file
        "206":
          description: Range 请求的部分内容
          schema:
            type: file
        "400":
          description: song_id 或 u 参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 非同源 URL 拒绝代理
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 上游不可用
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 反代 HLS 切片 / key / init 段
      tags:
      - 电台与 HLS
  /songs/{id}/lyric:
    get:
      description: 根据 song.ID 返回 LyricPayload JSON，含 lyric/tlyric/rlyric/lxlyric。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: LyricPayload
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 歌曲或歌词不存在
          schema:
            type: string
        "502":
          description: 歌词获取失败
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 获取歌曲歌词
      tags:
      - 歌曲管理
  /songs/{id}/lyrics:
    put:
      consumes:
      - application/json
      description: 更新指定歌曲的歌词内容和来源。url 来源传 lyric_remote_url,其它来源传 lyric/tlyric/rlyric/lxlyric
        四字段。响应里的 file_write_status 表示是否把元数据回写到本地音频文件:written=已写入,unchanged=未变更(非本地歌曲/无文件路径/不支持的扩展名/url
        来源),failed=尝试写入但失败(DB 已成功)。lyric_source=manual 用于标记用户手动调整,scanner 重扫时不会覆盖
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 歌词信息
        in: body
        name: request
        required: true
        schema:
          properties:
            lxlyric:
              type: string
            lyric:
              type: string
            lyric_remote_url:
              type: string
            lyric_source:
              type: string
            rlyric:
              type: string
            tlyric:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            properties:
              file_write_status:
                type: string
              message:
                type: string
            type: object
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 更新失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新歌曲歌词
      tags:
      - 歌曲管理
  /songs/{id}/play:
    get:
      description: 按 song.ID 流式返回音频。内部根据 song.type 分发到本地文件 / 缓存下载 / 直链下载 / 电台 302。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 音频文件
          schema:
            type: file
        "302":
          description: 电台流重定向
          schema:
            type: string
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 音源不可用
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 流式播放歌曲
      tags:
      - 歌曲管理
  /songs/{id}/play.m3u8:
    get:
      description: 按 song.ID 流式返回音频。内部根据 song.type 分发到本地文件 / 缓存下载 / 直链下载 / 电台 302。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 音频文件
          schema:
            type: file
        "302":
          description: 电台流重定向
          schema:
            type: string
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 音源不可用
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 流式播放歌曲
      tags:
      - 歌曲管理
  /songs/batch-delete:
    post:
      consumes:
      - application/json
      description: 根据歌曲 ID 列表批量删除歌曲
      parameters:
      - description: 批量删除请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.BatchDeleteSongsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/models.BatchDeleteSongsResponse'
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 删除失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量删除歌曲
      tags:
      - 歌曲管理
  /songs/clean:
    post:
      consumes:
      - application/json
      description: 清理本地歌曲中文件已不存在或位于排除目录中的记录，同时删除关联的封面文件
      produces:
      - application/json
      responses:
        "200":
          description: 清理成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 清理失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 清理无效的本地歌曲
      tags:
      - 歌曲管理
  /songs/ids:
    get:
      consumes:
      - application/json
      description: 与 /songs 共享过滤条件，仅返回 ID。用于「全选当前筛选范围」场景。
      parameters:
      - description: 歌曲类型
        in: query
        name: type
        type: string
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 按 file_path 前缀过滤
        in: query
        name: path_prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回 ID 列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取匹配歌曲的 ID 列表
      tags:
      - 歌曲管理
  /songs/radio:
    post:
      consumes:
      - application/json
      description: 批量添加电台/广播到数据库
      parameters:
      - description: 电台/广播列表
        in: body
        name: request
        required: true
        schema:
          items:
            properties:
              cover_url:
                type: string
              title:
                type: string
              url:
                type: string
            type: object
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: 添加成功
          schema:
            properties:
              count:
                type: integer
              songs:
                items:
                  $ref: '#/definitions/models.Song'
                type: array
            type: object
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 添加失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量添加电台/广播
      tags:
      - 歌曲管理
  /songs/remote:
    post:
      consumes:
      - application/json
      description: 批量添加网络歌曲到数据库
      parameters:
      - description: 网络歌曲列表
        in: body
        name: request
        required: true
        schema:
          items:
            properties:
              album:
                type: string
              artist:
                type: string
              cover_url:
                type: string
              dedup_key:
                type: string
              duration:
                type: number
              lyric:
                type: string
              lyric_source:
                type: string
              plugin_entry_path:
                type: string
              source_data:
                type: string
              title:
                type: string
              url:
                type: string
            type: object
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: 添加成功
          schema:
            properties:
              count:
                type: integer
              songs:
                items:
                  $ref: '#/definitions/models.Song'
                type: array
            type: object
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 添加失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量添加网络歌曲
      tags:
      - 歌曲管理
  /upgrade/check:
    get:
      consumes:
      - application/json
      description: 检查是否有可用的新版本
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回更新检查结果
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 检查更新失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 检查更新
      tags:
      - 系统升级
  /upgrade/progress:
    get:
      consumes:
      - application/json
      description: 获取当前升级任务的进度信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回升级进度
          schema:
            $ref: '#/definitions/models.UpgradeProgress'
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取升级进度
      tags:
      - 系统升级
  /upgrade/reset:
    post:
      consumes:
      - application/json
      description: 将二进制文件回退到 Docker 镜像中的原始版本，然后重启服务
      produces:
      - application/json
      responses:
        "200":
          description: 回退已开始
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "403":
          description: 非 Docker 环境不支持回退
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 回退到底包版本
      tags:
      - 系统升级
  /upgrade/start:
    post:
      consumes:
      - application/json
      description: 开始升级到指定版本
      parameters:
      - description: '升级请求 {version_type: stable|dev}'
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 升级已开始
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 升级失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 开始升级
      tags:
      - 系统升级
  /upgrade/versions:
    get:
      consumes:
      - application/json
      description: 获取正式版和测试版的版本信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回版本信息
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 获取版本信息失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取可用版本信息
      tags:
      - 系统升级
  /version:
    get:
      consumes:
      - application/json
      description: 获取应用的版本信息，包括版本号、Git提交哈希和构建时间
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回版本信息
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取应用版本信息
      tags:
      - 系统管理
securityDefinitions:
  BearerAuth:
    description: 输入 "Bearer {token}" 进行认证
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
