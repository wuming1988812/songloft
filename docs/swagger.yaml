              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量添加网络歌曲
      tags:
      - 歌曲管理
  /upgrade/check:
    get:
      consumes:
      - application/json
      description: 检查是否有可用的新版本
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回更新检查结果
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 检查更新失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 检查更新
      tags:
      - 系统升级
  /upgrade/progress:
    get:
      consumes:
      - application/json
      description: 获取当前升级任务的进度信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回升级进度
          schema:
            $ref: '#/definitions/models.UpgradeProgress'
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取升级进度
      tags:
      - 系统升级
  /upgrade/reset:
    post:
      consumes:
      - application/json
      description: 将二进制文件回退到 Docker 镜像中的原始版本，然后重启服务
      produces:
      - application/json
      responses:
        "200":
          description: 回退已开始
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "403":
          description: 非 Docker 环境不支持回退
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 回退到底包版本
      tags:
      - 系统升级
  /upgrade/start:
    post:
      consumes:
      - application/json
      description: 开始升级到指定版本
      parameters:
      - description: '升级请求 {version_type: stable|dev}'
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 升级已开始
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 升级失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 开始升级
      tags:
      - 系统升级
  /upgrade/versions:
    get:
      consumes:
      - application/json
      description: 获取正式版和测试版的版本信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回版本信息
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 获取版本信息失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取可用版本信息
      tags:
      - 系统升级
  /version:
    get:
      consumes:
      - application/json
      description: 获取应用的版本信息，包括版本号、Git提交哈希和构建时间
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回版本信息
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取应用版本信息
      tags:
      - 系统管理
securityDefinitions:
  BearerAuth:
    description: 输入 "Bearer {token}" 进行认证
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
